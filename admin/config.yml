# =============================================================================
# Decap CMS configuration
# =============================================================================
# This file defines what the admin form looks like. Each `field` here
# becomes one input on the page. The `name` of a field is what gets written
# into the post's front matter, so they must match what _config.yml and the
# layouts expect (title, date, categories, header, location, gallery, etc).
# =============================================================================

# -----------------------------------------------------------------------------
# Backend: Netlify Identity + Git Gateway
# Saves go to GitHub via Netlify; we don't need to put any GitHub token here.
# -----------------------------------------------------------------------------
backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: 'Add post: {{slug}}'
    update: 'Edit post: {{slug}}'
    delete: 'Delete post: {{slug}}'
    uploadMedia: 'Upload {{path}}'
    deleteMedia: 'Delete {{path}}'

# -----------------------------------------------------------------------------
# Editorial workflow — drafts don't trigger builds; only Publish does
# -----------------------------------------------------------------------------
# When this is on, "Save" stores a draft on a separate branch (cms/...) and
# does NOT trigger a Netlify build. Only when she clicks "Publish" (or drags
# a card to "Ready") does the change merge to main and the site rebuild.
#
# IMPORTANT: in Netlify dashboard, Site configuration → Build & Deploy →
# Deploy Previews → set to "Don't build deploy previews". Otherwise Netlify
# builds every CMS branch and the credit savings vanish.
publish_mode: editorial_workflow

# Where the live site lives. Used by the "preview" feature.
site_url: https://where-in-the-world-are-mike-and-jen.netlify.app
display_url: https://where-in-the-world-are-mike-and-jen.netlify.app
# logo_url removed — was pointing at a now-hidden Iceland placeholder image
# and 404'd in the admin console. Add a real Cloudinary URL here if you want
# a custom logo at the top of the admin sidebar.

# -----------------------------------------------------------------------------
# Media: Cloudinary
# Photos uploaded inside the editor go straight to Cloudinary. Decap inserts
# the Cloudinary URL into the post automatically.
# -----------------------------------------------------------------------------
media_library:
  name: cloudinary
  config:
    cloud_name: dgw35sldo
    api_key: '353435959467269'
    # Auto-optimization on every uploaded image:
    #   - fetch_format: auto      → serve WebP/AVIF where supported, JPEG otherwise
    #   - quality: auto           → Cloudinary picks the smallest size with no visible loss
    #   - width: 1200, crop: limit → cap displayed width at 1200px (no upscaling)
    # Originals stay full-size in Cloudinary; only the delivered URL is shrunk.
    default_transformations:
      - - fetch_format: auto
          quality: auto
          width: 1200
          crop: limit

# Local fallback (only used if Cloudinary fails to load — should never trigger).
media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

# -----------------------------------------------------------------------------
# Collections — the kinds of content that can be edited from the admin.
# Two collections: trips (one per vacation) and posts (one per day).
# When you create a trip, it shows up in the Trip dropdown when you create
# posts — no code changes needed for new trips.
# -----------------------------------------------------------------------------
collections:

  # -------------------------------------------------------------------------
  # Site configuration — single-file edits for site-wide settings
  # -------------------------------------------------------------------------
  - name: "site-config"
    label: "Site Settings"
    description: "Quick edits to global site values."
    files:
      - file: "_data/status.yml"
        label: "Status bar (current location / next destination)"
        name: "status"
        fields:
          - { label: "Current location",
              name: "current_location",
              widget: "string",
              hint: "Shown in the top bar with a 📍 pin. Use 'Home' or leave blank to hide between trips." }
          - { label: "Current timezone",
              name: "current_timezone",
              widget: "string",
              required: false,
              default: "America/Los_Angeles",
              hint: "IANA timezone for the live clock. Examples: America/Los_Angeles, America/New_York, Europe/Paris, Asia/Tokyo, Asia/Ho_Chi_Minh." }
          - { label: "Next destination",
              name: "next_destination",
              widget: "string",
              required: false,
              hint: "Free-form text shown with a ✈️ icon. e.g. 'Tokyo, Japan — Sep 2026'. Leave blank to hide." }

      - file: "_pages/about.md"
        label: "About page (text)"
        name: "about"
        fields:
          - { label: "Title", name: "title", widget: "hidden", default: "About" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/about/" }
          - { label: "Layout", name: "layout", widget: "hidden", default: "single" }
          - { label: "Author profile", name: "author_profile", widget: "hidden", default: false }
          - label: "Body"
            name: "body"
            widget: "markdown"
            hint: "Write the about page content. Use the toolbar for formatting; drag photos in to upload."

      - file: "_data/favorites.yml"
        label: "Favorites page"
        name: "favorites"
        fields:
          - { label: "Intro paragraph",
              name: "intro",
              widget: "string",
              required: false }
          - label: "Categories"
            name: "categories"
            widget: "list"
            summary: "{{fields.icon}} {{fields.name}}"
            fields:
              - { label: "Category name", name: "name", widget: "string", hint: "e.g. 'Best Food'" }
              - { label: "Icon emoji", name: "icon", widget: "string", required: false, hint: "Single emoji shown next to the title. e.g. 🍜" }
              - { label: "Short description", name: "description", widget: "string", required: false }
              - label: "Countries in this category"
                name: "entries"
                widget: "list"
                summary: "{{fields.country}}"
                required: false
                fields:
                  - { label: "Country / Place", name: "country", widget: "string" }
                  - { label: "Linked trip slug", name: "trip_slug", widget: "string", required: false, hint: "If this country has a trip on the site, paste its slug (e.g. 'vietnam') to make the card clickable." }
                  - { label: "Cover photo", name: "cover", widget: "image", required: false }
                  - { label: "Blurb (one line)", name: "blurb", widget: "string", required: false }

      - file: "_data/daydream.yml"
        label: "Daydreaming page"
        name: "daydream"
        fields:
          - { label: "Intro paragraph",
              name: "intro",
              widget: "string",
              required: false }
          - label: "Wish list (in priority order)"
            name: "queue"
            widget: "list"
            summary: "{{fields.country}}"
            fields:
              - { label: "Country / Place", name: "country", widget: "string" }
              - { label: "Cover photo", name: "cover", widget: "image", required: false }
              - { label: "Why we want to go", name: "why", widget: "string", required: false, hint: "One sentence on what's drawing us there." }
              - { label: "When (rough timing)", name: "when", widget: "string", required: false, hint: "e.g. 'Summer 2027' or 'Once the kids are older'." }

  # -------------------------------------------------------------------------
  # Trips collection — one entry per vacation.
  # Each trip becomes a page at /<slug>/ showing its day-by-day post list.
  # -------------------------------------------------------------------------
  - name: "trips"
    label: "Trips"
    label_singular: "Trip"
    description: "One entry per vacation. Add a trip first, then create day posts and assign them to it."
    folder: "_trips"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}} · {{location}}"
    sortable_fields: ['start_date', 'title']
    fields:
      - { label: "Trip name",
          name: "title",
          widget: "string",
          hint: "e.g. 'Iceland 2024'. The URL will be auto-generated from this — keep it short and recognizable." }

      - { label: "One-sentence description",
          name: "description",
          widget: "string",
          hint: "Shown on the homepage card and in listings." }

      - { label: "Cover photo",
          name: "cover",
          widget: "image",
          hint: "Drag in the photo that represents this whole trip — used as the card image on the homepage." }

      - { label: "Cover — focal X (0–100)",
          name: "cover_focal_x",
          widget: "number",
          required: false,
          value_type: "int",
          default: 50,
          min: 0,
          max: 100,
          hint: "Set automatically by the 🎯 Position Photo tool (floating button bottom-right). 50 = centered. Don't edit by hand unless you know what you want." }

      - { label: "Cover — focal Y (0–100)",
          name: "cover_focal_y",
          widget: "number",
          required: false,
          value_type: "int",
          default: 50,
          min: 0,
          max: 100 }

      - { label: "Start date",
          name: "start_date",
          widget: "datetime",
          format: "YYYY-MM-DD",
          time_format: false,
          date_format: "YYYY-MM-DD" }

      - { label: "End date",
          name: "end_date",
          widget: "datetime",
          format: "YYYY-MM-DD",
          time_format: false,
          date_format: "YYYY-MM-DD" }

      - { label: "Location (region/country)",
          name: "location",
          widget: "string",
          hint: "e.g. 'Iceland', 'Tokyo, Japan'. Shown on the card and used by the 'sort by location' option." }

      - { label: "Map pin — Latitude",
          name: "lat",
          widget: "number",
          required: false,
          value_type: "float",
          hint: "Where to place this trip's pin on the world map. Get from latlong.net. Optional but recommended." }

      - { label: "Map pin — Longitude",
          name: "lng",
          widget: "number",
          required: false,
          value_type: "float" }

      - label: "Additional countries (multi-country trip)"
        name: "countries"
        widget: "list"
        required: false
        collapsed: true
        summary: "{{fields.name}}"
        hint: "For trips that span multiple countries, add a pin per country. Each pin appears on the world map and clicks through to this same trip page. Get coords from latlong.net (country center is usually fine)."
        fields:
          - { label: "Country name", name: "name", widget: "string" }
          - { label: "Latitude", name: "lat", widget: "number", value_type: "float" }
          - { label: "Longitude", name: "lng", widget: "number", value_type: "float" }

      - { label: "Country code (2 letters)",
          name: "country_code",
          widget: "string",
          required: false,
          hint: "e.g. 'is' for Iceland, 'jp' for Japan. Optional — used for a future country-fill feature on the map." }

      - { label: "Tags",
          name: "tags",
          widget: "list",
          required: false,
          default: [],
          hint: "Filter chips on the homepage. Use region (europe, asia), style (road-trip, beach), or theme (food, hiking). Lowercase + dashes." }

      - { label: "Optional intro text",
          name: "body",
          widget: "markdown",
          required: false,
          hint: "Optional. Appears below the description on the trip page, before the day-by-day list. Leave blank to skip." }

  # -------------------------------------------------------------------------
  # Posts collection — one entry per day of a trip.
  # -------------------------------------------------------------------------
  - name: "posts"
    label: "Travel Posts"
    label_singular: "Travel Post"
    description: "Each day's blog entry. Pick the trip, set the day order, write away."
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} · {{commit_date | date('YYYY-MM-DD')}}"
    sortable_fields: ['date', 'title', 'order']
    view_filters:
      - label: "Iceland 2024"
        field: categories
        pattern: "iceland-2024"
    fields:
      - { label: "Title",
          name: "title",
          widget: "string",
          hint: "The headline of the post — e.g. 'Day 3 — The South Coast'." }

      - { label: "Date",
          name: "date",
          widget: "datetime",
          format: "YYYY-MM-DD",
          time_format: false,
          date_format: "YYYY-MM-DD" }

      - label: "Trip"
        name: "categories"
        widget: "relation"
        collection: "trips"
        search_fields: ["title", "location"]
        value_field: "{{slug}}"
        display_fields: ["title"]
        multiple: true
        min: 1
        max: 1
        hint: "Pick which trip this post belongs to. New trips you create show up here automatically."

      - { label: "Day order in trip",
          name: "order",
          widget: "number",
          value_type: "int",
          min: 0,
          hint: "1 = day 1, 2 = day 2. Controls sort order on the trip page." }

      - label: "Cover & banner"
        name: "header"
        widget: "object"
        hint: "The big photo at the top of the post and the thumbnail in listings."
        fields:
          - { label: "Teaser (small thumbnail in listings)",
              name: "teaser",
              widget: "image" }
          - { label: "Teaser — focal X (0–100)",
              name: "teaser_focal_x",
              widget: "number",
              required: false,
              value_type: "int",
              default: 50,
              min: 0,
              max: 100,
              hint: "Set automatically by the 🎯 Position Photo tool (floating button bottom-right). 50 = centered." }
          - { label: "Teaser — focal Y (0–100)",
              name: "teaser_focal_y",
              widget: "number",
              required: false,
              value_type: "int",
              default: 50,
              min: 0,
              max: 100 }
          - { label: "Banner (large image at top of post)",
              name: "overlay_image",
              widget: "image" }
          - { label: "Banner — focal X (0–100)",
              name: "overlay_focal_x",
              widget: "number",
              required: false,
              value_type: "int",
              default: 50,
              min: 0,
              max: 100,
              hint: "Set automatically by the 🎯 Position Photo tool. 50 = centered." }
          - { label: "Banner — focal Y (0–100)",
              name: "overlay_focal_y",
              widget: "number",
              required: false,
              value_type: "int",
              default: 50,
              min: 0,
              max: 100 }
          - { label: "Banner darkening (0–1)",
              name: "overlay_filter",
              widget: "number",
              value_type: "float",
              default: 0.4,
              min: 0,
              max: 1,
              step: 0.1,
              hint: "0 = no darkening, 1 = fully black. Higher numbers make the title text more readable on bright photos." }

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        default: []
        hint: "Optional keywords (e.g. food, hiking). Leave empty if you don't care."

      - label: "Map pin location"
        name: "location"
        widget: "object"
        required: false
        collapsed: true
        hint: "Adds a pin to the trip map. Get coordinates from latlong.net. Skip the whole block for travel/rest days with no specific location."
        fields:
          - { label: "Place name",
              name: "name",
              widget: "string",
              required: false,
              hint: "e.g. Reykjavik, Iceland" }
          - { label: "Latitude",
              name: "lat",
              widget: "number",
              required: false,
              value_type: "float" }
          - { label: "Longitude",
              name: "lng",
              widget: "number",
              required: false,
              value_type: "float" }

      - label: "Photo gallery"
        name: "gallery"
        widget: "list"
        required: false
        collapsed: true
        hint: "Photos shown together as a grid. Add a row per photo. The two image fields can be the same — upload once, click 'use existing' for the second."
        fields:
          - { label: "Image (full size)",
              name: "url",
              widget: "image" }
          - { label: "Image (thumbnail — usually same)",
              name: "image_path",
              widget: "image" }
          - { label: "Caption / alt text",
              name: "alt",
              widget: "string",
              required: false }

      - { label: "Excerpt",
          name: "excerpt",
          widget: "string",
          required: false,
          hint: "One-sentence summary shown in listings. Optional — Jekyll auto-generates one from the body if you skip this." }

      - { label: "Show table of contents",
          name: "toc",
          widget: "boolean",
          default: false,
          required: false,
          hint: "Turn on for long posts (5+ sections). Adds a sticky list of headings on the side that readers can click to jump around. Off by default." }

      - { label: "Body",
          name: "body",
          widget: "markdown",
          hint: "Write your post here. Use the toolbar above for formatting; drag photos in to upload." }
