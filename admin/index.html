<!doctype html>
<html lang="en">
<!--
  =============================================================================
  /admin/index.html — entry point for the visual content editor
  =============================================================================
  This page IS the editor. When your wife visits /admin/ she'll see a
  Netlify Identity login prompt; once logged in, Decap CMS loads the posts
  from the GitHub repo and presents them as a form-based editor.

  Photos uploaded inside the editor go to Cloudinary (configured in
  /admin/config.yml). Content saved goes back to the GitHub repo via
  Netlify's Git Gateway, which triggers a Netlify rebuild.

  No build step or front matter on this file — Jekyll passes it through
  to the published site as-is.
  =============================================================================
-->
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Blog · Editor</title>
  <link rel="icon" href="data:," />
</head>
<body>
  <!-- Decap CMS itself (the admin UI) -->
  <script src="https://unpkg.com/decap-cms@^3.1.0/dist/decap-cms.js"></script>

  <!-- Cloudinary media library plugin for Decap (drag-and-drop uploads) -->
  <script src="https://unpkg.com/decap-cms-media-library-cloudinary@^3.0.0/dist/decap-cms-media-library-cloudinary.js"></script>

  <!-- Netlify Identity widget for login (handles invitation, password, sessions) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!--
    =========================================================================
    JWT AUTO-REFRESH + REDIRECT TO CUSTOM LOGIN
    =========================================================================
    Netlify Identity JWTs default to a 1-hour lifetime. Without explicit
    refresh, a long writing session ends with "unable to save" errors.
    Two safeguards:

      1. Every 45 minutes, force-refresh the JWT so it never expires
         while the editor is open.
      2. If the user lands on /admin/ without a session, send them to
         /login/ — our custom Bitwarden-friendly form — rather than
         showing the iframe widget that password managers can't fill.
    =========================================================================
  -->
  <script>
    (function () {
      function whenReady(cb, tries) {
        tries = tries || 0;
        if (window.netlifyIdentity) cb();
        else if (tries < 50) setTimeout(function () { whenReady(cb, tries + 1); }, 100);
      }

      whenReady(function () {
        netlifyIdentity.on("init", function (user) {
          if (!user) {
            // No session — send them through our custom login.
            window.location.href = "/login/";
          }
        });

        // Refresh the JWT every 45 minutes to keep the session alive.
        setInterval(function () {
          var u = netlifyIdentity.currentUser && netlifyIdentity.currentUser();
          if (u && u.jwt) {
            u.jwt(true).catch(function () {
              // Refresh failed — log it but don't break the editor.
              console.warn("[admin] JWT refresh failed; user may need to log in again.");
            });
          }
        }, 45 * 60 * 1000);
      });
    })();
  </script>

  <!--
    =========================================================================
    EDITOR COMPONENTS — custom blocks she can insert in the post body
    =========================================================================
    The "📷 Photo Gallery" button appears in the markdown editor's toolbar.
    Clicking it opens a form: she picks one or more photos (via Cloudinary)
    and optionally adds a caption. On save, a {% gallery_block ... %} tag is
    written into the markdown at her cursor position. At build time, the
    Jekyll plugin in _plugins/gallery_block.rb converts that tag into a
    styled grid of clickable photos.
    =========================================================================
  -->
  <script>
    // ----- "😊 Emoji" -----
    // Curated list of useful general + travel emojis. Pick one from the
    // dropdown and it's inserted at her cursor. For anything not on the
    // list, OS emoji picker still works (Win+. on Windows, Ctrl+Cmd+Space on Mac).
    CMS.registerEditorComponent({
      id: "emoji",
      label: "😊 Emoji",
      fields: [
        {
          name: "emoji",
          label: "Pick an emoji",
          widget: "select",
          options: [
            // Travel / transport
            { label: "✈️  Plane",            value: "✈️" },
            { label: "🚗 Car",               value: "🚗" },
            { label: "🚆 Train",             value: "🚆" },
            { label: "🛵 Scooter",           value: "🛵" },
            { label: "🏍️  Motorbike",        value: "🏍️" },
            { label: "🚢 Ship",              value: "🚢" },
            { label: "🛶 Canoe",             value: "🛶" },
            { label: "🚁 Helicopter",        value: "🚁" },
            { label: "🌍 Globe (EU/AF)",     value: "🌍" },
            { label: "🌏 Globe (Asia)",      value: "🌏" },
            { label: "🌎 Globe (Americas)",  value: "🌎" },
            { label: "🗺️  Map",              value: "🗺️" },
            { label: "📍 Pin",               value: "📍" },
            { label: "🧳 Suitcase",          value: "🧳" },
            { label: "🎒 Backpack",          value: "🎒" },
            { label: "🛏️  Hotel bed",        value: "🛏️" },
            { label: "⛺ Tent",              value: "⛺" },
            // Nature / scenery
            { label: "🏔️  Mountain",         value: "🏔️" },
            { label: "🌋 Volcano",           value: "🌋" },
            { label: "🏖️  Beach",            value: "🏖️" },
            { label: "🏝️  Island",           value: "🏝️" },
            { label: "🌅 Sunrise",           value: "🌅" },
            { label: "🌄 Sunrise over mtns", value: "🌄" },
            { label: "🌇 Sunset (city)",     value: "🌇" },
            { label: "🌌 Milky Way",         value: "🌌" },
            { label: "🌳 Tree",              value: "🌳" },
            { label: "🌴 Palm",              value: "🌴" },
            { label: "🌊 Wave",              value: "🌊" },
            { label: "❄️  Snowflake",        value: "❄️" },
            { label: "☀️  Sun",              value: "☀️" },
            { label: "⛅ Cloudy",            value: "⛅" },
            { label: "🌧️  Rain",             value: "🌧️" },
            { label: "🌈 Rainbow",           value: "🌈" },
            // Animals
            { label: "🐅 Tiger",             value: "🐅" },
            { label: "🐘 Elephant",          value: "🐘" },
            { label: "🦒 Giraffe",           value: "🦒" },
            { label: "🦓 Zebra",             value: "🦓" },
            { label: "🐆 Leopard",           value: "🐆" },
            { label: "🐧 Penguin",           value: "🐧" },
            { label: "🐠 Fish",              value: "🐠" },
            { label: "🐢 Turtle",            value: "🐢" },
            { label: "🐑 Sheep",             value: "🐑" },
            { label: "🐕 Dog",               value: "🐕" },
            // Food / drink
            { label: "🍜 Noodles",           value: "🍜" },
            { label: "🍣 Sushi",             value: "🍣" },
            { label: "🍕 Pizza",             value: "🍕" },
            { label: "🥖 Bread",             value: "🥖" },
            { label: "🥐 Croissant",         value: "🥐" },
            { label: "🌮 Taco",              value: "🌮" },
            { label: "🍔 Burger",            value: "🍔" },
            { label: "🍦 Ice cream",         value: "🍦" },
            { label: "🍫 Chocolate",         value: "🍫" },
            { label: "🍷 Wine",              value: "🍷" },
            { label: "🍺 Beer",              value: "🍺" },
            { label: "☕ Coffee",            value: "☕" },
            { label: "🧉 Mate",              value: "🧉" },
            // Buildings / culture
            { label: "🏰 Castle",            value: "🏰" },
            { label: "🕌 Mosque",            value: "🕌" },
            { label: "⛩️  Torii",            value: "⛩️" },
            { label: "🛕 Temple",            value: "🛕" },
            { label: "⛪ Church",            value: "⛪" },
            { label: "🗽 Statue of Liberty", value: "🗽" },
            { label: "🗼 Tokyo Tower",       value: "🗼" },
            { label: "🏛️  Classical",        value: "🏛️" },
            // Activities / vibes
            { label: "🥾 Hiking boot",       value: "🥾" },
            { label: "🚴 Cycling",           value: "🚴" },
            { label: "🏊 Swimming",          value: "🏊" },
            { label: "🧗 Climbing",          value: "🧗" },
            { label: "🎒 Backpacking",       value: "🎒" },
            { label: "📸 Camera",            value: "📸" },
            { label: "🎫 Ticket",            value: "🎫" },
            { label: "🎟️  Admission",        value: "🎟️" },
            // Emotions / reactions
            { label: "❤️  Heart",            value: "❤️" },
            { label: "💗 Pink heart",        value: "💗" },
            { label: "✨ Sparkles",          value: "✨" },
            { label: "🌟 Star",              value: "🌟" },
            { label: "😍 Heart eyes",        value: "😍" },
            { label: "🥰 Smiling hearts",    value: "🥰" },
            { label: "😋 Yum",               value: "😋" },
            { label: "😮 Wow",               value: "😮" },
            { label: "😂 Laughing",          value: "😂" },
            { label: "🤣 Rolling laugh",     value: "🤣" },
            { label: "🥹 Holding back tears",value: "🥹" },
            { label: "😴 Sleepy",            value: "😴" },
            { label: "🥺 Pleading",          value: "🥺" }
          ]
        }
      ],
      pattern: /\{%\s*emoji_block\s+(\S+)\s*%\}/,
      fromBlock: function (match) {
        try { return JSON.parse(decodeURIComponent(match[1])); }
        catch (e) { return { emoji: "" }; }
      },
      toBlock: function (data) {
        // Just insert the emoji character directly — no Liquid tag, no plugin.
        return (data && data.emoji) ? data.emoji : "";
      },
      toPreview: function (data) {
        return '<span style="font-size:1.4em;">' + ((data && data.emoji) || "") + '</span>';
      }
    });

    // ----- "🎬 YouTube Video" -----
    CMS.registerEditorComponent({
      id: "youtube",
      label: "🎬 YouTube Video",
      fields: [
        {
          name: "url",
          label: "YouTube URL",
          widget: "string",
          hint: "Paste the YouTube URL from your browser. Any format works (youtube.com/watch?v=..., youtu.be/..., or just the video ID)."
        }
      ],
      pattern: /\{%\s*youtube_block\s+(\S+)\s*%\}/,
      fromBlock: function (match) {
        try { return JSON.parse(decodeURIComponent(match[1])); }
        catch (e) { return { url: "" }; }
      },
      toBlock: function (data) {
        return "{% youtube_block " + encodeURIComponent(JSON.stringify(data)) + " %}";
      },
      toPreview: function (data) {
        var url = (data && data.url) || "";
        // Try to extract the ID so we can show a thumbnail preview
        var m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/)|youtu\.be\/)([\w-]{11})|^([\w-]{11})$/);
        var id = m && (m[1] || m[2]);
        if (id) {
          return '<div style="border:1px dashed #aaa;padding:0.6em;background:#fafafa;border-radius:6px;">' +
                 '<div style="font-size:0.85em;color:#555;margin-bottom:0.3em;">🎬 YouTube preview</div>' +
                 '<img src="https://img.youtube.com/vi/' + id + '/hqdefault.jpg" style="width:100%;max-width:480px;display:block;">' +
                 '</div>';
        }
        return '<div style="border:1px dashed #aaa;padding:0.6em;background:#fafafa;color:#888;">🎬 ' + (url || '(paste a YouTube URL)') + '</div>';
      }
    });

    // ----- "🎵 Audio Clip" -----
    CMS.registerEditorComponent({
      id: "audio",
      label: "🎵 Audio Clip",
      fields: [
        {
          name: "audio",
          label: "Audio file",
          widget: "file",
          hint: "Upload an MP3 (or any audio file Cloudinary accepts)."
        },
        {
          name: "title",
          label: "Title (optional)",
          widget: "string",
          required: false,
          hint: "Shown above the player. e.g. 'Sounds of the Hanoi market'."
        }
      ],
      pattern: /\{%\s*audio_block\s+(\S+)\s*%\}/,
      fromBlock: function (match) {
        try {
          return JSON.parse(decodeURIComponent(match[1]));
        } catch (e) {
          return { audio: "", title: "" };
        }
      },
      toBlock: function (data) {
        return "{% audio_block " + encodeURIComponent(JSON.stringify(data)) + " %}";
      },
      toPreview: function (data) {
        var title = (data && data.title) ? data.title : "(audio clip)";
        var url = (data && data.audio) || "";
        return (
          '<div style="border:1px dashed #aaa;padding:0.6em;background:#fafafa;border-radius:6px;">' +
          '<div style="font-size:0.85em;color:#555;">🎵 ' + title + '</div>' +
          (url ? '<audio controls preload="none" src="' + url + '" style="width:100%;margin-top:0.5em;"></audio>' : '<div style="color:#aaa;">(no audio uploaded yet)</div>') +
          "</div>"
        );
      }
    });

    // ----- "📷 Photo Gallery" -----
    CMS.registerEditorComponent({
      id: "gallery",
      label: "📷 Photo Gallery",
      fields: [
        {
          name: "photos",
          label: "Photos",
          widget: "list",
          summary: "{{fields.image}}",
          field: {
            name: "image",
            label: "Image",
            widget: "image",
            hint: "Click here, then upload or pick a photo. Repeat 'Add' to add more."
          },
          hint: "Add as many photos as you want — they'll render in a grid."
        },
        {
          name: "caption",
          label: "Caption (optional)",
          widget: "string",
          required: false,
          hint: "Shown below the gallery in italic."
        }
      ],
      pattern: /\{%\s*gallery_block\s+(\S+)\s*%\}/,
      fromBlock: function (match) {
        try {
          return JSON.parse(decodeURIComponent(match[1]));
        } catch (e) {
          return { photos: [], caption: "" };
        }
      },
      toBlock: function (data) {
        return "{% gallery_block " + encodeURIComponent(JSON.stringify(data)) + " %}";
      },
      toPreview: function (data) {
        var photos = (data && data.photos) || [];
        var imgs = photos
          .map(function (p) {
            var url = p && (p.image || p);
            if (!url) return "";
            return '<img src="' + url + '" style="width:23%;margin:1%;border-radius:4px;">';
          })
          .join("");
        return (
          '<div style="border:1px dashed #aaa;padding:0.6em;background:#fafafa;border-radius:6px;">' +
          '<div style="font-size:0.85em;color:#555;margin-bottom:0.3em;">📷 Gallery (' +
          photos.length +
          " photo" +
          (photos.length === 1 ? "" : "s") +
          ")</div>" +
          imgs +
          (data && data.caption
            ? '<div style="text-align:center;color:#666;font-style:italic;font-size:0.9em;margin-top:0.3em;">' +
              data.caption +
              "</div>"
            : "") +
          "</div>"
        );
      }
    });
  </script>
</body>
</html>
