# =============================================================================
# trips.yml — master list of trips
# =============================================================================
# This file is the "source of truth" for all trips on the site. The homepage
# and the /trips/ page both read from this list to know what to show.
#
# To add a new trip:
#   1. Add a new entry here (copy the format below)
#   2. Create a matching trip page in _pages/<slug>.md
#   3. Create posts in _posts/ that use `categories: [<slug>]` in their front matter
#   4. Put photos in assets/images/<slug>/
#
# FIELDS:
#   slug         — short URL-friendly name; MUST match the category used in posts
#   name         — display name for the trip (any capitalization, spaces ok)
#   description  — one-sentence summary shown on the homepage
#   cover        — path to the trip's cover image (relative to site root)
#   start_date / end_date — for sorting and display
#   location     — country / region (shown on listings, used by "sort by location")
#   tags         — list of tags used for the filter buttons on the homepage
#                  and /trips/ page. Use whatever categorization helps you —
#                  region (Europe, Asia), style (road-trip, beach), theme
#                  (food, hiking, family). Lowercase + dashes recommended.
# =============================================================================

- slug: iceland-2024
  name: "Iceland 2024"
  description: "Two weeks driving the Ring Road, chasing waterfalls and northern lights."
  cover: /assets/images/iceland-2024/cover.jpg
  start_date: 2024-06-01
  end_date: 2024-06-14
  location: "Iceland"
  tags:
    - europe
    - road-trip
    - nature

