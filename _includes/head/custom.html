<!--
  =============================================================================
  CUSTOM HEAD CONTENT
  =============================================================================
  Minimal Mistakes automatically includes this file inside <head> on every
  page. Use it for Google Fonts, favicons, analytics — anything that lives
  in <head>.
  =============================================================================
-->

<!-- Lora serif font for headings (free, hosted by Google) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

<!--
  Favicon — emoji (✈️) embedded as an SVG data URL. No file needed.
  This is what shows in the browser tab next to the site title and stops
  the /favicon.ico 404 errors in the console.
-->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%E2%9C%88%EF%B8%8F</text></svg>">

<!--
  GLightbox — click any photo (gallery or inline) to open a fullscreen viewer
  with prev/next arrows, ESC-to-close, and click-background-to-close. Free,
  vanilla JS, no jQuery.
-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
<script>
  // -------------------------------------------------------------------------
  // FIX MINIMAL MISTAKES' VIDEO WRAPPER
  // -------------------------------------------------------------------------
  // MM auto-wraps every YouTube/Vimeo iframe in a .fluid-width-video-wrapper
  // div using inline `style="padding-top: <ratio>%"`. When the iframe has
  // `width="100%" height="400"` attributes, the calculated ratio is 400%,
  // making the wrapper 4× too tall. Even with !important CSS rules, MM's
  // inline styles can occasionally win the specificity race.
  //
  // This snippet runs after the page loads and force-rewrites the inline
  // styles on every video wrapper to a clean 16:9 aspect ratio. JS-set
  // inline styles always win over JS-set inline styles (last-write).
  // -------------------------------------------------------------------------
  window.addEventListener("load", function () {
    document.querySelectorAll(".fluid-width-video-wrapper").forEach(function (w) {
      w.style.paddingTop = "0";
      w.style.paddingBottom = "0";
      w.style.height = "auto";
      w.style.aspectRatio = "16 / 9";
    });
  });
</script>

<script defer>
  // Initialize after DOM and GLightbox library are both loaded.
  window.addEventListener("DOMContentLoaded", function () {
    if (typeof GLightbox === "undefined") return;

    // GLightbox auto-detects slide type from URL extension. Some image hosts
    // (Cloudinary's transformed paths, picsum, etc.) don't end in .jpg, so
    // GLightbox falls back to iframe mode and the photo loads at native
    // size with scrollbars. Pre-tag every gallery link as type:image to
    // skip the auto-detection.
    var GALLERY_SELECTOR =
      ".page__content figure a, .page__content .gallery a, .page__content a.image-popup, .page__content .inline-gallery-link";
    document.querySelectorAll(GALLERY_SELECTOR).forEach(function (a) {
      if (!a.dataset.glightbox) a.dataset.glightbox = "type: image";
    });

    // Per-gallery scope: assign each <figure>'s links a unique data-gallery
    // so the lightbox cycles only within that figure's photos, not across
    // every gallery on the page. Our inline-gallery blocks already get
    // their own data-gallery via the Ruby plugin.
    document.querySelectorAll(".page__content figure").forEach(function (fig, i) {
      var groupId = "fig" + i;
      fig.querySelectorAll("a").forEach(function (a) {
        if (!a.dataset.gallery) a.dataset.gallery = groupId;
      });
    });

    GLightbox({
      selector: GALLERY_SELECTOR,
      loop: true,
      touchNavigation: true,
      // Disable click-to-zoom so the photo fits the viewport instead of
      // showing native-size with scrollbars.
      zoomable: false,
      draggable: false
    });
  });
</script>

<!--
  Netlify Identity widget. Loaded on every page so that:
   1. When someone clicks the email-confirmation link from their invite, the
      page can detect the auth token in the URL and route them to /admin/.
   2. A "Login" link in the future could trigger the widget from anywhere.
  When no one is signed in, the widget is invisible.
-->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  // After confirming an invitation, Netlify Identity drops the user back on
  // the homepage with a token in the URL. This snippet catches that and
  // forwards them straight to the admin editor.
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", function (user) {
      if (!user) {
        window.netlifyIdentity.on("login", function () {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
