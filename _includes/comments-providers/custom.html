<!--
  =============================================================================
  CUSTOM COMMENTS PROVIDER — Cusdis
  =============================================================================
  Minimal Mistakes lets us slot in any comment system here. We use Cusdis
  because it requires no signup from your visitors — they just type a name
  and a comment.

  Activation is gated on `site.cusdis_app_id` being set in _config.yml.
  Until you fill that in, this include renders nothing (post pages just
  silently lack comments — no error, no broken UI).

  See README.md for the one-time signup at cusdis.com.
  =============================================================================
-->

{% if site.cusdis_app_id %}
<section class="comments-block">
  <h2>💬 Leave us a note</h2>
  <p class="comments-instructions">
    No signup needed — just type your name and a message, then click <strong>Submit</strong>.
    We love hearing from family, friends, and fellow travelers.
  </p>

  <!--
    Cusdis embed. The data-* attributes tell their script which post this is
    (so threads stay attached to the right post even if URLs change later).
    The min-height on the iframe is enforced via main.scss so the Submit
    button is always visible without scrolling.
  -->
  <div id="cusdis_thread"
    data-host="https://cusdis.com"
    data-app-id="{{ site.cusdis_app_id }}"
    data-page-id="{{ page.id }}"
    data-page-url="{{ page.url | absolute_url }}"
    data-page-title="{{ page.title | escape }}">
  </div>
  <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
</section>
{% endif %}
